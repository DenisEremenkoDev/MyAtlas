  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4.5\"><\u002Fcircle><path d=\"M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n            <sc-if value=\"{{state.darkOff}}\" hint-placeholder-val=\"{{true}}\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fbutton>\n          <sc-if value=\"{{isMobile}}\" hint-placeholder-val=\"{{true}}\">\n            <button onclick=\"{{setDeviceDesktop}}\" title=\"Открыть как веб-версию\" style=\"width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"13\" rx=\"2\"><\u002Frect><line x1=\"8\" y1=\"21\" x2=\"16\" y2=\"21\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{isMobile}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"flex:1;min-height:0\">{{tabBody}}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{isDesktopMode}}\" hint-placeholder-val=\"{{false}}\">\n          {{navBarTop}}\n          <div style=\"flex:1;min-height:0\">{{tabBody}}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{isMobile}}\" hint-placeholder-val=\"{{true}}\">\n          {{navBarBottom}}\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{loggedOut}}\" hint-placeholder-val=\"{{false}}\">\n      {{authScreen}}\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{showLogoutLink}}\" hint-placeholder-val=\"{{false}}\">\n    <button onclick=\"{{logout}}\" style=\"margin-top:14px;background:none;border:none;font-size:12px;color:{{theme.textMuted}};text-decoration:underline;cursor:pointer;display:flex;align-items:center;gap:5px\">\n      <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"><\u002Fline><polyline points=\"12 19 5 12 12 5\"><\u002Fpolyline><\u002Fsvg>\n      вернуться к экрану входа\n    <\u002Fbutton>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nconst PLACES = [\n  { id: 1, name: \"Кофейня на Рубинштейна\", x: 30, y: 34, rating: 5, status: \"был\", tags: [\"кофейня\", \"работа\"], priv: \"public\",\n    note: \"Лучший флэт-уайт в городе, особенно тихо утром в будни — можно спокойно поработать пару часов у окна.\" },\n  { id: 2, name: \"Секретный дворик\", x: 62, y: 20, rating: 5, status: \"был\", tags: [\"секрет\", \"закат\"], priv: \"private\",\n    note: \"Про это место никто не знает — заходишь через арку рядом с булочной. Идеально для вечера в одиночестве, особенно на закате.\" },\n  { id: 3, name: \"Смотровая у моста\", x: 76, y: 58, rating: 4, status: \"хочу\", tags: [\"виды\"], priv: \"public\",\n    note: \"Советовала Аня, ещё не дошла — говорят, оттуда видно весь центр.\" },\n  { id: 4, name: \"Книжный на Некрасова\", x: 20, y: 68, rating: 4, status: \"был\", tags: [\"книги\", \"тихо\"], priv: \"public\",\n    note: \"Небольшой независимый магазин, хороший выбор поэзии и всегда можно посидеть с чашкой чая.\" },\n];\n\nconst ROUTES = [\n  { id: 1, name: \"Вечерняя прогулка у Невы\", distance: \"3.2 км\", duration: \"42 мин\", date: \"12 июня\",\n    points: [{x:12,y:78},{x:20,y:70},{x:24,y:58},{x:33,y:52},{x:38,y:40},{ 2',\n  text:'#252521', textMuted:'#8B887D', textFaint:'#B3AFA0',\n  primary:'#24404A', primaryDark:'#182A30', primarySoft:'#E7EEF0',\n  accent:'#B5643F', accentSoft:'#FBF0E7', accentText:'#9C5A32',\n  chipBg:'#E6E3D9', chipText:'#7E7A6E',\n  headerBg:'#24404A',\n  mapBg:'#DEE3DD', mapGrid:'#D3DAD2', mapRoad:'#C3CBC0', mapPark:'#C9D6C7', mapWater:'#B9CBCE',\n  navInactive:'#A8A399', modalOverlay:'rgba(20,24,22,.45)', softShadow:'0 2px 10px rgba(36,64,74,.10)',\n  pinPubA:'#D48A5F', pinPubB:'#A85434', pinPrivA:'#33555F', pinPrivB:'#182A30',\n};\nconst DARK = {\n  pageBg:'#12181A', bg:'#171F21', surface:'#212A2D', surfaceAlt:'#1B2325',\n  border:'#2C373A', borderStrong:'#3C4A4D',\n  text:'#ECE9E2', textMuted:'#8F978F', textFaint:'#5C6567',\n  primary:'#6C9AA5', primaryDark:'#4A727C', primarySoft:'#233034',\n  accent:'#D69670', accentSoft:'#2C231D', accentText:'#E3A87D',\n  chipBg:'#283032', chipText:'#9B9A90',\n  headerBg:'#101718',\n  mapBg:'#1C2426', mapGrid:'#232D2F', mapRoad:'#2B3638', mapPark:'#243530', mapWater:'#1F343A',\n  navInactive:'#586063', modalOverlay:'rgba(0,0,0,.6)', softShadow:'0 2px 14px rgba(0,0,0,.4)',\n  pinPubA:'#C67C50', pinPubB:'#95492D', pinPrivA:'#3E6570', pinPrivB:'#1C343B',\n};\n\nfunction pinIcon(theme, priv) {\n  const a = priv === 'private' ? theme.pinPrivA : theme.pinPubA;\n  const b = priv === 'private' ? theme.pinPrivB : theme.pinPubB;\n  return { a, b };\n}\n\nclass Component extends DCLogic {\n  state = {\n    loggedIn: false,\n    dark: false,\n    device: 'mobile',\n    tab: 'catalog',\n    mode: 'places',\n    selectedPlaceId: 1,\n    selectedRouteId: 1,\n    detailPlaceId: null,\n    detailRouteId: null,\n    showAdd: false,\n    addRating: 0,\n    addStatus: 'хочу',\n    addPriv: 'public',\n    addTags: [],\n    likes: {},\n  };\n\n  componentDidMount() {\n    if (typeof window !== 'undefined' && window.innerWidth >= 760) {\n      this.setState({ device: 'desktop' });\n    }\n  }\n\n  login = () => this.setState({ loggedIn: true });\n  logout = () => this.setState({ loggedIn: false, tab: 'catalog' });\n  toggleDark = () => this.setState(s => ({ dark: !s.dark }));\n  setDeviceDesktop = () => this.setState({ device: 'desktop' });\n  setDeviceMobile = () => this.setState({ device: 'mobile' });\n  setTab = (t) => this.setState({ tab: t });\n\n  setMode = (m) => this.setState({ mode: m });\n  selectPlace = (id) => this.setState({ selectedPlaceId: id });\n  selectRoute = (id) => this.setState({ selectedRouteId: id });\n  openPlaceDetail = (id) => this.setState({ selectedPlaceId: id, detailPlaceId: id });\n  closePlaceDetail = () => this.setState({ detailPlaceId: null });\n  openRouteDetail = (id) => this.setState({ selectedRouteId: id, detailRouteId: id });\n  closeRouteDetail = () => this.setState({ detailRouteId: null });\n\n  openAdd = () => this.setState({ showAdd: true, addRating: 0, addStatus: 'хочу', addPriv: 'public', addTags: [] });\n  closeAdd = () => this.setState({ showAdd: false });\n  saveAdd = () => this.setState({ showAdd: false });\n  setAddRating = (n) => this.setState({ addRating: n });\n  setAddStatus = (s) => this.setState({ addStatus: s });\n  setAddPriv = (p) => this.setState({ addPriv: p });\n  toggleAddTag = (t) => this.setState(s => ({ addTags: s.addTags.includes(t) ? s.addTags.filter(x => x !== t) : [...s.addTags, t] }));\n\n  toggleLike = (key, base) => this.setState(s => {\n    const cur = s.likes[key];\n    const liked = cur ? !cur.liked : true;\n    return { likes: { ...s.likes, [key]: { liked, count: base + (liked ? 1 : 0) } } };\n  });\n\n  renderVals() {\n    const s = this.state;\n    const theme = s.dark ? DARK : LIGHT;\n    const isMobile = s.device === 'mobile';\n    const isDesktop = !isMobile;\n\n    const places = PLACES.map(p => ({\n      ...p,\n      selected: p.id === s.selectedPlaceId,\n      pin: pinIcon(theme, p.priv),\n      statusIsBeen: p.status === 'был',\n      starsArr: [1,2,3,4,5].map(n => ({ key: p.id + '-' + n, filled: n <= p.rating })),\n    }));\n    const selectedPlace = places.find(p => p.selected) || places[0];\n\n    const routes = ROUTES.map((r, i) => ({\n      ...r,\n      selected: r.id === s.selectedRouteId,\n      color: i === 0 ? theme.accent : theme.primary,\n      pathStr: r.points.map(p => `${p.x}%,${p.y}%`).join(' '),\n    }));\n    const selectedRoute = routes.find(r => r.selected) || routes[0];\n\n    const likeFor = (prefix, id, base) => {\n      const key = prefix + id;\n      const l = s.likes[key];\n      return { liked: !!(l && l.liked), count: l ? l.count : base, toggle: () => this.toggleLike(key, base) };\n    };\n\n    const feed = FEED.map(f => {\n      const lk = likeFor('feed', f.id, f.likes);\n      return { ...f, isPhoto: f.kind === 'photo', isRoute: f.kind === 'route',\n        pathStr: f.points ? f.points.map(p => `${p.x},${p.y}`).join(' ') : '',\n        liked: lk.liked, likeCount: lk.count, toggleLike: lk.toggle,\n        photoA: f.id % 2 === 1 ? theme.accent : theme.primary, photoB: f.id % 2 === 1 ? theme.pinPubB : theme.pinPrivB,\n        routeColor: f.id === 3 ? theme.accent : theme.primary };\n    });\n\n    const wallPosts = WALL_POSTS.map(w => {\n      const lk = likeFor('wall', w.id, w.likes);\n      return { ...w, liked: lk.liked, likeCount: lk.count, toggleLike: lk.toggle };\n    });\n\n    const friendPlaces = FRIEND_PLACES.map(p => ({ ...p, starsArr: [1,2,3,4,5].map(n => ({ key: p.id+'-'+n, filled: n <= p.rating })) }));\n\n    const nearby = NEARBY.map((n, i) => ({ ...n, key: 'nb'+i, isMine: n.from === 'ты' }));\n\n    const navItems = [\n      { key: 'catalog', label: 'Каталог', soon: false },\n      { key: 'nearby', label: 'Рядом', soon: true },\n      { key: 'friends', label: 'Друзья', soon: true },\n      { key: 'profile', label: 'Профиль', soon: false },\n    ].map(it => ({ ...it, active: it.key === s.tab, select: () => this.setTab(it.key) }));\n\n    const shellWrapperStyle = isMobile\n      ? `width:100%;flex:1;min-height:0;background:${theme.bg};
