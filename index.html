<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#24404A">
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="#24404A"/><circle cx="100" cy="82" r="42" fill="#B5643F"/><path d="M100 150 L70 100 A42 42 0 0 1 130 100 Z" fill="#B5643F"/></svg></template>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Petrona:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:10px}
  input,textarea{font-family:inherit}
  input::placeholder,textarea::placeholder{opacity:.7}
  @keyframes pinDrop{0%{transform:translate(-50%,-100%) translateY(-6px);opacity:0}100%{transform:translate(-50%,-100%) translateY(0);opacity:1}}
  @keyframes sheetUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
  @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
  @keyframes geoPulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(2.2);opacity:0}}
</style>
</helmet>

<div style="width:100%;height:100dvh;background:{{theme.pageBg}};display:flex;flex-direction:column;align-items:center;font-family:'Work Sans',sans-serif;overflow:hidden">

  <sc-if value="{{isDesktop}}" hint-placeholder-val="{{true}}">
    <div style="width:100%;max-width:960px;padding:22px 20px 14px;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box">
      <div>
        <h1 style="margin:0;font-family:'Petrona',serif;font-style:italic;font-weight:600;font-size:22px;color:{{theme.text}}">Мой Атлас</h1>
        <p style="margin:3px 0 0;font-size:12px;color:{{theme.textMuted}}">Личный каталог любимых мест на карте</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onClick="{{toggleDark}}" style="width:34px;height:34px;border-radius:10px;border:1px solid {{theme.border}};background:{{theme.surface}};color:{{theme.text}};display:flex;align-items:center;justify-content:center;cursor:pointer" style-hover="border-color:{{theme.borderStrong}}">
          <sc-if value="{{state.dark}}" hint-placeholder-val="{{false}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>
          </sc-if>
          <sc-if value="{{state.darkOff}}" hint-placeholder-val="{{true}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>
          </sc-if>
        </button>
        <div style="display:flex;align-items:center;gap:2px;background:{{theme.surface}};border:1px solid {{theme.border}};border-radius:11px;padding:3px">
          <button onClick="{{setDeviceDesktop}}" style="{{btnDesktopStyle}}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="13" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Веб
          </button>
          <button onClick="{{setDeviceMobile}}" style="{{btnMobileStyle}}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2.5"/><line x1="10.5" y1="18.5" x2="13.5" y2="18.5"/></svg>
            Телефон
          </button>
        </div>
      </div>
    </div>
  </sc-if>

  <div style="{{shellWrapperStyle}}">
    <sc-if value="{{loggedIn}}" hint-placeholder-val="{{false}}">
      <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:{{theme.bg}}">

        <div style="flex-shrink:0;background:{{theme.headerBg}};padding:12px 14px;display:flex;align-items:center;gap:9px">
          <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(155deg,#C97C51,{{theme.accent}});display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.28);flex-shrink:0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="{{theme.headerBg}}"><circle cx="12" cy="10" r="6"/><path d="M12 22s7-8 7-13a7 7 0 10-14 0c0 5 7 13 7 13z" fill="none" stroke="{{theme.headerBg}}" stroke-width="2.4"/></svg>
          </div>
          <div style="flex:1;position:relative;min-width:0">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.3" stroke-linecap="round" style="position:absolute;left:10px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input placeholder="Найти место или адрес…" style="width:100%;background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:8px 10px 8px 30px;color:#fff;font-size:12.5px;outline:none;box-sizing:border-box" />
          </div>
          <button onClick="{{toggleDark}}" style="width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer">
            <sc-if value="{{state.dark}}" hint-placeholder-val="{{false}}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>
            </sc-if>
            <sc-if value="{{state.darkOff}}" hint-placeholder-val="{{true}}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>
            </sc-if>
          </button>
          <sc-if value="{{isMobile}}" hint-placeholder-val="{{true}}">
            <button onClick="{{setDeviceDesktop}}" title="Открыть как веб-версию" style="width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="13" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
          </sc-if>
        </div>

        <sc-if value="{{isMobile}}" hint-placeholder-val="{{true}}">
          <div style="flex:1;min-height:0">{{tabBody}}</div>
        </sc-if>
        <sc-if value="{{isDesktopMode}}" hint-placeholder-val="{{false}}">
          {{navBarTop}}
          <div style="flex:1;min-height:0">{{tabBody}}</div>
        </sc-if>

        <sc-if value="{{isMobile}}" hint-placeholder-val="{{true}}">
          {{navBarBottom}}
        </sc-if>
      </div>
    </sc-if>

    <sc-if value="{{loggedOut}}" hint-placeholder-val="{{false}}">
      {{authScreen}}
    </sc-if>
  </div>

  <sc-if value="{{showLogoutLink}}" hint-placeholder-val="{{false}}">
    <button onClick="{{logout}}" style="margin-top:14px;background:none;border:none;font-size:12px;color:{{theme.textMuted}};text-decoration:underline;cursor:pointer;display:flex;align-items:center;gap:5px">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      вернуться к экрану входа
    </button>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

const PLACES = [
  { id: 1, name: "Кофейня на Рубинштейна", x: 30, y: 34, rating: 5, status: "был", tags: ["кофейня", "работа"], priv: "public",
    note: "Лучший флэт-уайт в городе, особенно тихо утром в будни — можно спокойно поработать пару часов у окна." },
  { id: 2, name: "Секретный дворик", x: 62, y: 20, rating: 5, status: "был", tags: ["секрет", "закат"], priv: "private",
    note: "Про это место никто не знает — заходишь через арку рядом с булочной. Идеально для вечера в одиночестве, особенно на закате." },
  { id: 3, name: "Смотровая у моста", x: 76, y: 58, rating: 4, status: "хочу", tags: ["виды"], priv: "public",
    note: "Советовала Аня, ещё не дошла — говорят, оттуда видно весь центр." },
  { id: 4, name: "Книжный на Некрасова", x: 20, y: 68, rating: 4, status: "был", tags: ["книги", "тихо"], priv: "public",
    note: "Небольшой независимый магазин, хороший выбор поэзии и всегда можно посидеть с чашкой чая." },
];

const ROUTES = [
  { id: 1, name: "Вечерняя прогулка у Невы", distance: "3.2 км", duration: "42 мин", date: "12 июня",
    points: [{x:12,y:78},{x:20,y:70},{x:24,y:58},{x:33,y:52},{x:38,y:40},{x:47,y:36},{x:55,y:26},{x:66,y:22},{x:74,y:14}] },
  { id: 2, name: "Утренняя пробежка в парке", distance: "5.0 км", duration: "27 мин", date: "3 июня",
    points: [{x:16,y:24},{x:22,y:34},{x:20,y:46},{x:30,y:54},{x:28,y:66},{x:38,y:72},{x:50,y:68},{x:58,y:58},{x:56,y:46},{x:62,y:34}] },
];

const FRIEND_PLACES = [
  { id: 101, name: "Ротонда на Пушкинской", author: "Аня", rating: 5, tags: ["виды", "секрет"] },
  { id: 102, name: "Бар «Низкий полёт»", author: "Дима", rating: 4, tags: ["вечер"] },
  { id: 103, name: "Веранда у канала", author: "Соня", rating: 5, tags: ["закат", "тихо"] },
];

const FEED = [
  { id: 1, kind: "photo", caption: "Кофейня на Рубинштейна", likes: 14, comments: 3 },
  { id: 2, kind: "photo", caption: "Секретный дворик", likes: 22, comments: 5 },
  { id: 3, kind: "route", caption: "Вечерняя прогулка у Невы", likes: 9, comments: 1, points: ROUTES[0].points },
  { id: 4, kind: "route", caption: "Утренняя пробежка в парке", likes: 17, comments: 2, points: ROUTES[1].points },
];

const WALL_POSTS = [
  { id: 1, date: "2 дня назад",
    text: "Наконец дошла до смотровой у моста, про которую все говорили. Стояла там час просто смотрела на воду — иногда самое лучшее решение это никуда не спешить.",
    likes: 6, comments: 2 },
];

const NEARBY = [
  { label: "Кофейня", x: 30, y: 30, from: "ты", saved: true },
  { label: "Пиццерия", x: 70, y: 36, from: "Аня", saved: false },
  { label: "Бар", x: 60, y: 68, from: "Дима", saved: false },
  { label: "Аптека", x: 22, y: 60, from: "ты", saved: true },
];

const TAGS = ["кофейня", "закат", "на свидание", "секрет", "виды", "тихо", "книги", "работа"];
const STATUS_TEXT = "Собираю тихие дворы и виды на закат — люблю находить места, о которых никто не знает.";

const LIGHT = {
  pageBg:'#E3E0D8', bg:'#EEECE6', surface:'#FFFFFF', surfaceAlt:'#F6F4EE',
  border:'#DEDBCF', borderStrong:'#C7C2B2',
  text:'#252521', textMuted:'#8B887D', textFaint:'#B3AFA0',
  primary:'#24404A', primaryDark:'#182A30', primarySoft:'#E7EEF0',
  accent:'#B5643F', accentSoft:'#FBF0E7', accentText:'#9C5A32',
  chipBg:'#E6E3D9', chipText:'#7E7A6E',
  headerBg:'#24404A',
  mapBg:'#DEE3DD', mapGrid:'#D3DAD2', mapRoad:'#C3CBC0', mapPark:'#C9D6C7', mapWater:'#B9CBCE',
  navInactive:'#A8A399', modalOverlay:'rgba(20,24,22,.45)', softShadow:'0 2px 10px rgba(36,64,74,.10)',
  pinPubA:'#D48A5F', pinPubB:'#A85434', pinPrivA:'#33555F', pinPrivB:'#182A30',
};
const DARK = {
  pageBg:'#12181A', bg:'#171F21', surface:'#212A2D', surfaceAlt:'#1B2325',
  border:'#2C373A', borderStrong:'#3C4A4D',
  text:'#ECE9E2', textMuted:'#8F978F', textFaint:'#5C6567',
  primary:'#6C9AA5', primaryDark:'#4A727C', primarySoft:'#233034',
  accent:'#D69670', accentSoft:'#2C231D', accentText:'#E3A87D',
  chipBg:'#283032', chipText:'#9B9A90',
  headerBg:'#101718',
  mapBg:'#1C2426', mapGrid:'#232D2F', mapRoad:'#2B3638', mapPark:'#243530', mapWater:'#1F343A',
  navInactive:'#586063', modalOverlay:'rgba(0,0,0,.6)', softShadow:'0 2px 14px rgba(0,0,0,.4)',
  pinPubA:'#C67C50', pinPubB:'#95492D', pinPrivA:'#3E6570', pinPrivB:'#1C343B',
};

function pinIcon(theme, priv) {
  const a = priv === 'private' ? theme.pinPrivA : theme.pinPubA;
  const b = priv === 'private' ? theme.pinPrivB : theme.pinPubB;
  return { a, b };
}

class Component extends DCLogic {
  state = {
    loggedIn: false,
    dark: false,
    device: 'mobile',
    tab: 'catalog',
    mode: 'places',
    selectedPlaceId: 1,
    selectedRouteId: 1,
    detailPlaceId: null,
    detailRouteId: null,
    showAdd: false,
    addRating: 0,
    addStatus: 'хочу',
    addPriv: 'public',
    addTags: [],
    likes: {},
  };

  componentDidMount() {
    if (typeof window !== 'undefined' && window.innerWidth >= 760) {
      this.setState({ device: 'desktop' });
    }
  }

  login = () => this.setState({ loggedIn: true });
  logout = () => this.setState({ loggedIn: false, tab: 'catalog' });
  toggleDark = () => this.setState(s => ({ dark: !s.dark }));
  setDeviceDesktop = () => this.setState({ device: 'desktop' });
  setDeviceMobile = () => this.setState({ device: 'mobile' });
  setTab = (t) => this.setState({ tab: t });

  setMode = (m) => this.setState({ mode: m });
  selectPlace = (id) => this.setState({ selectedPlaceId: id });
  selectRoute = (id) => this.setState({ selectedRouteId: id });
  openPlaceDetail = (id) => this.setState({ selectedPlaceId: id, detailPlaceId: id });
  closePlaceDetail = () => this.setState({ detailPlaceId: null });
  openRouteDetail = (id) => this.setState({ selectedRouteId: id, detailRouteId: id });
  closeRouteDetail = () => this.setState({ detailRouteId: null });

  openAdd = () => this.setState(s => ({ showAdd: true, addRating: 0, addStatus: 'хочу', addPriv: 'public', addTags: [], addMode: s.mode }));
  closeAdd = () => this.setState({ showAdd: false });
  saveAdd = () => this.setState({ showAdd: false });
  setAddRating = (n) => this.setState({ addRating: n });
  setAddStatus = (s) => this.setState({ addStatus: s });
  setAddPriv = (p) => this.setState({ addPriv: p });
  toggleAddTag = (t) => this.setState(s => ({ addTags: s.addTags.includes(t) ? s.addTags.filter(x => x !== t) : [...s.addTags, t] }));

  toggleLike = (key, base) => this.setState(s => {
    const cur = s.likes[key];
    const liked = cur ? !cur.liked : true;
    return { likes: { ...s.likes, [key]: { liked, count: base + (liked ? 1 : 0) } } };
  });

  renderVals() {
    const s = this.state;
    const theme = s.dark ? DARK : LIGHT;
    const isMobile = s.device === 'mobile';
    const isDesktop = !isMobile;

    const places = PLACES.map(p => ({
      ...p,
      selected: p.id === s.selectedPlaceId,
      pin: pinIcon(theme, p.priv),
      statusIsBeen: p.status === 'был',
      starsArr: [1,2,3,4,5].map(n => ({ key: p.id + '-' + n, filled: n <= p.rating })),
    }));
    const selectedPlace = places.find(p => p.selected) || places[0];

    const routes = ROUTES.map((r, i) => ({
      ...r,
      selected: r.id === s.selectedRouteId,
      color: i === 0 ? theme.accent : theme.primary,
      pathStr: r.points.map(p => `${p.x}%,${p.y}%`).join(' '),
    }));
    const selectedRoute = routes.find(r => r.selected) || routes[0];

    const likeFor = (prefix, id, base) => {
      const key = prefix + id;
      const l = s.likes[key];
      return { liked: !!(l && l.liked), count: l ? l.count : base, toggle: () => this.toggleLike(key, base) };
    };

    const feed = FEED.map(f => {
      const lk = likeFor('feed', f.id, f.likes);
      return { ...f, isPhoto: f.kind === 'photo', isRoute: f.kind === 'route',
        pathStr: f.points ? f.points.map(p => `${p.x},${p.y}`).join(' ') : '',
        liked: lk.liked, likeCount: lk.count, toggleLike: lk.toggle,
        photoA: f.id % 2 === 1 ? theme.accent : theme.primary, photoB: f.id % 2 === 1 ? theme.pinPubB : theme.pinPrivB,
        routeColor: f.id === 3 ? theme.accent : theme.primary };
    });

    const wallPosts = WALL_POSTS.map(w => {
      const lk = likeFor('wall', w.id, w.likes);
      return { ...w, liked: lk.liked, likeCount: lk.count, toggleLike: lk.toggle };
    });

    const friendPlaces = FRIEND_PLACES.map(p => ({ ...p, starsArr: [1,2,3,4,5].map(n => ({ key: p.id+'-'+n, filled: n <= p.rating })) }));

    const nearby = NEARBY.map((n, i) => ({ ...n, key: 'nb'+i, isMine: n.from === 'ты' }));

    const navItems = [
      { key: 'catalog', label: 'Каталог', soon: false },
      { key: 'nearby', label: 'Рядом', soon: true },
      { key: 'friends', label: 'Друзья', soon: true },
      { key: 'profile', label: 'Профиль', soon: false },
    ].map(it => ({ ...it, active: it.key === s.tab, select: () => this.setTab(it.key) }));

    const shellWrapperStyle = isMobile
      ? `width:100%;flex:1;min-height:0;background:${theme.bg};display:flex;flex-direction:column;overflow:hidden;`
      : `width:100%;max-width:960px;height:660px;background:${theme.bg};border-radius:24px;box-shadow:0 18px 46px rgba(20,30,28,.22);overflow:hidden;display:flex;flex-direction:column;margin-bottom:8px;`;

    const btnBase = 'display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;border:none;font-size:11.5px;font-weight:500;cursor:pointer;';
    const btnDesktopStyle = btnBase + (isDesktop ? `background:${theme.primary};color:#fff;` : `background:transparent;color:${theme.textMuted};`);
    const btnMobileStyle = btnBase + (isMobile ? `background:${theme.primary};color:#fff;` : `background:transparent;color:${theme.textMuted};`);

    return {
      theme, state: { ...s, darkOff: !s.dark }, isMobile, isDesktop,
      isDesktopMode: isDesktop,
      loggedIn: s.loggedIn, loggedOut: !s.loggedIn,
      showLogoutLink: isDesktop && s.loggedIn,
      toggleDark: this.toggleDark, setDeviceDesktop: this.setDeviceDesktop, setDeviceMobile: this.setDeviceMobile,
      logout: this.logout,
      shellWrapperStyle, btnDesktopStyle, btnMobileStyle,
      authScreen: this.renderAuth(theme),
      navBarTop: this.renderNav(navItems, theme, false),
      navBarBottom: this.renderNav(navItems, theme, true),
      tabBody: this.renderTab(s, theme, isMobile, { places, selectedPlace, routes, selectedRoute, feed, wallPosts, friendPlaces, nearby }),
    };
  }

  renderAuth(theme) {
    const e = React.createElement;
    const inputStyle = { width:'100%', border:`1px solid ${theme.border}`, borderRadius:10, padding:'9px 11px', fontSize:13, marginBottom:12, outline:'none', boxSizing:'border-box', background: theme.surface, color: theme.text };
    return e('div', { style:{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:`linear-gradient(180deg, ${theme.primary}, ${theme.primaryDark})`, padding:'24px' } },
      e('div', { style:{ width:'100%', maxWidth:340 } },
        e('div', { style:{ display:'flex', alignItems:'center', gap:9, justifyContent:'center', marginBottom:26 } },
          e('div', { style:{ width:40, height:40, borderRadius:12, background:`linear-gradient(155deg,#C97C51,${theme.accent})`, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 3px 8px rgba(0,0,0,.25)' } },
            e('svg', { width:19, height:19, viewBox:'0 0 24 24', fill:theme.primaryDark },
              e('circle', { cx:12, cy:10, r:6 }),
              e('path', { d:'M12 22s7-8 7-13a7 7 0 10-14 0c0 5 7 13 7 13z', fill:'none', stroke:theme.primaryDark, strokeWidth:2.4 })
            )
          ),
          e('span', { style:{ color:'#fff', fontFamily:"'Petrona',serif", fontStyle:'italic', fontWeight:600, fontSize:24, letterSpacing:'-0.01em' } }, 'Мой Атлас')
        ),
